services:
  gateway:
    build: .
    container_name: k3g-paperclip-tool-gateway
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/k3g-ai-stack/repos:/workspace/repos:ro
      - /opt/k3g-ai-stack/docs:/workspace/docs:ro
      - /opt/k3g-ai-stack/logs/gateway:/workspace/logs/gateway
    environment:
      - GATEWAY_NAME=paperclip-tool-gateway
      - GATEWAY_MODE=mvp
      - LLAMA_BASE_URL=http://127.0.0.1:18088/v1
      - MAX_PROMPT_CHARS=12000
